    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

    /* Toggle switch */
    .toggle-switch { position: relative; width: 44px; height: 24px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; cursor: pointer; inset: 0;
      background-color: #d1d5db; border-radius: 24px;
      transition: 0.3s;
    }
    .toggle-slider:before {
      position: absolute; content: ""; height: 18px; width: 18px;
      left: 3px; bottom: 3px; background-color: white;
      border-radius: 50%; transition: 0.3s;
    }
    input:checked + .toggle-slider { background-color: #0064d2; }
    input:checked + .toggle-slider:before { transform: translateX(20px); }
    
    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.2s ease-out; }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .animate-spin { animation: spin 1s linear infinite; }
    
    /* Hide scrollbar for message list on mobile */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      const date = new Date(timestamp);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);
      
      if (diffMins < 60) return `${diffMins}m ago`;
      if (diffHours < 24) return `${diffHours}h ago`;
      if (diffDays < 7) return `${diffDays}d ago`;
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

              email,
              password,
            });

              // Email confirmation required
              setMessage('Check your email for a confirmation link!');
              setLoading(false);
              return;
            }
            
            if (data.session) {
              onLogin(data.user);
            }

            // Sign in
            const { data, error } = await supabase.auth.signInWithPassword({
              email,
              password,
            });
            
            if (error) throw error;

    // API Base URL
    const API_URL = 'https://ontera-api.onteraai.workers.dev';

    // Main Dashboard

      const loadStores = async () => {
        setLoadingStores(true);
        const { data, error } = await supabase
          .from('stores')
          .select('*')
          .order('created_at', { ascending: true });

        if (error) {
          console.error('Error loading stores:', error);
        } else {
          // Build store list dynamically from database
          const storeList = data.map(dbStore => ({
            id: dbStore.id,
            name: dbStore.store_name,
            platform: dbStore.platform || 'ebay',
            connected: dbStore.is_active,
            messages: 0,
            orders: 0,
            dbId: dbStore.id,
            accessToken: dbStore.access_token,
            refreshToken: dbStore.refresh_token,
          }));

          setStores(storeList);
        }
        setLoadingStores(false);
      };
      
      const loadMessages = async (refreshToken) => {
        setLoadingMessages(true);
        try {
          // Step 1: Get fresh access token
          const tokenRes = await fetch(`${API_URL}/api/ebay/refresh-token`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ refresh_token: refreshToken }),
          });
          const tokenData = await tokenRes.json();
          
          if (tokenData.error) {
            console.error('Token error:', tokenData);
            setLoadingMessages(false);
            return;
          }
          
          setAccessToken(tokenData.access_token);
          
          // Step 2: Fetch conversations via REST Message API
          const messagesRes = await fetch(`${API_URL}/api/ebay/conversations`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ access_token: tokenData.access_token }),
          });
          const messagesData = await messagesRes.json();

          if (messagesData.messages) {
            // Transform to UI format
            const formattedMessages = messagesData.messages.map(m => ({
              id: m.id || m.conversationId,
              conversationId: m.conversationId,
              sender: m.sender,
              subject: m.latestMessage
                ? (m.latestMessage.length > 80 ? m.latestMessage.substring(0, 80) + '...' : m.latestMessage)
                : 'No messages yet',
              itemId: m.itemId,
              itemTitle: m.itemTitle || 'eBay Item',
              timestamp: m.receiveDate,
              read: m.read,
              replied: false,
              needsResponse: m.needsReply || m.unreadCount > 0,
              conversation: [],
              unreadCount: m.unreadCount || 0,
              latestMessage: m.latestMessage || '',
            }));

            setMessages(formattedMessages);

            // Update selected store's message count
            setStores(prev => prev.map(s =>
              s.dbId === selectedStore?.dbId ? { ...s, messages: formattedMessages.length } : s
            ));
          }
        } catch (err) {
          console.error('Error loading messages:', err);
        }
        setLoadingMessages(false);
      };
      
      const loadMessageDetail = async (message) => {
        if (!accessToken) return null;

        try {
          // Use REST Message API conversation endpoint
          if (message.conversationId) {
            const res = await fetch(`${API_URL}/api/ebay/conversation`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ access_token: accessToken, conversation_id: message.conversationId }),
            });
            const detail = await res.json();
            // Worker already tags each message as buyer/seller based on first message sender
            return detail;
          }

          // Fallback to legacy thread endpoint for old-format messages
          if (message.allMessageIds && message.allMessageIds.length > 0) {
            const res = await fetch(`${API_URL}/api/ebay/thread`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ access_token: accessToken, message_ids: message.allMessageIds }),
            });
            return await res.json();
          }

          // Final fallback to single message
          const res = await fetch(`${API_URL}/api/ebay/message`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ access_token: accessToken, message_id: message.id }),
          });
          return await res.json();
        } catch (err) {
          console.error('Error loading message detail:', err);
          return null;
        }
      };
      
      const handleSelectMessage = async (message) => {
        setSelectedMessage({ ...message, loadingDetail: true });

        const detail = await loadMessageDetail(message);

            ...message,
            itemTitle: detail.itemTitle || message.itemTitle,
            conversation: detail.conversation,
            loadingDetail: false,

        } else {
          setSelectedMessage({ ...message, loadingDetail: false, conversation: [] });

              needsResponse: false,
              replied: true,
              conversation: updatedConversation(m),

          return m;

        setSelectedMessage(prev => {
          if (prev && prev.id === messageId) {
            return {
              ...prev,
              needsResponse: false,
              replied: true,
              conversation: updatedConversation(prev),
            };
          }
          return prev;
        });

                            </button>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                  
                  {/* Coming Soon */}
                  <div className="mt-8">
                    <h2 className="text-sm font-medium text-gray-500 uppercase tracking-wider mb-4">Coming Soon</h2>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                      {['Amazon', 'Shopify', 'TikTok Shop', 'Etsy'].map((platform) => (
                        <div key={platform} className="bg-gray-50 border border-gray-200 rounded-xl p-4 text-center opacity-60">
                          <p className="text-gray-500 text-sm">{platform}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}
              
              {activeTab === 'settings' && (
                <div className="p-4 md:p-6">
                  <h1 className="text-xl font-semibold text-gray-900 mb-6">Settings</h1>
                  
                  <div className="space-y-6 max-w-2xl">
                    <div className="bg-white border shadow-sm border-gray-200 rounded-xl p-4 md:p-5">
                      <h3 className="text-gray-900 font-medium mb-4">AI Response Settings</h3>
                      <div className="space-y-4">
                        <label className="flex items-center justify-between gap-4">
                          <div>
                            <p className="text-gray-700">Auto-respond to messages</p>
                            <p className="text-sm text-gray-500">AI will automatically reply to customer messages</p>
                          </div>
                          <label className="toggle-switch flex-shrink-0">
                            <input type="checkbox" />
                            <span className="toggle-slider"></span>
                          </label>
                        </label>
                        
                        <label className="flex items-center justify-between gap-4">
                          <div>
                            <p className="text-gray-700">Require approval</p>
                            <p className="text-sm text-gray-500">Review AI responses before sending</p>
                          </div>
                          <label className="toggle-switch flex-shrink-0">
                            <input type="checkbox" defaultChecked />
                            <span className="toggle-slider"></span>
                          </label>
                        </label>
                      </div>
                    </div>
                    
                    <div className="bg-white border shadow-sm border-gray-200 rounded-xl p-4 md:p-5">
                      <h3 className="text-gray-900 font-medium mb-4">Notifications</h3>
                      <div className="space-y-4">
                        <label className="flex items-center justify-between gap-4">
                          <div>
                            <p className="text-gray-700">Email notifications</p>
                            <p className="text-sm text-gray-500">Get notified of new messages</p>
                          </div>
                          <label className="toggle-switch flex-shrink-0">
                            <input type="checkbox" defaultChecked />
                            <span className="toggle-slider"></span>
                          </label>
                        </label>
                        
                        <label className="flex items-center justify-between gap-4">
                          <div>
                            <p className="text-gray-700">Daily digest</p>
                            <p className="text-sm text-gray-500">Summary of store activity</p>
                          </div>
                          <label className="toggle-switch flex-shrink-0">
                            <input type="checkbox" defaultChecked />
                            <span className="toggle-slider"></span>
                          </label>
                        </label>
                      </div>
                    </div>
                    
                    <div className="bg-white border shadow-sm border-gray-200 rounded-xl p-4 md:p-5">
                      <h3 className="text-gray-900 font-medium mb-4">Account</h3>
                      <div className="space-y-3">
                        <div className="flex items-center justify-between">
                          <span className="text-gray-500">Email</span>
                          <span className="text-gray-900">{user.email}</span>
                        </div>
                        <div className="flex items-center justify-between">
                          <span className="text-gray-500">Plan</span>
                          <span className="text-blue-600">Pro - $149/mo</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
            
            {/* Message Detail Panel */}
            {selectedMessage && (
              <div className="fixed inset-0 md:relative md:inset-auto w-full lg:w-[480px] md:border-l border-gray-200 bg-white md:bg-gray-50/80 flex flex-col z-50 md:z-auto pt-[105px] md:pt-0">
                <MessageThread
                  message={selectedMessage}
                  onSendReply={handleSendReply}
                  onClose={() => setSelectedMessage(null)}
                  accessToken={accessToken}
                />
              </div>
            )}
          </div>
          
          {/* Connect Store Modal */}
          {showConnectModal && (
            <ConnectStoreModal
              onClose={() => setShowConnectModal(false)}
              onConnect={() => loadStores()}
              user={user}
            />
          )}
        </div>
      );
    };

    // Main App
    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      
      // Check for existing Supabase session
      useEffect(() => {
        // Get initial session
        supabase.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user ?? null);
          setLoading(false);
        });

        // Listen for auth changes
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user ?? null);
        });

        return () => subscription.unsubscribe();
      }, []);
      
      const handleLogin = (userData) => {
        setUser(userData);
      };
      
      const handleLogout = async () => {
        await supabase.auth.signOut();
        setUser(null);
      };
      
      // Show loading state while checking session
      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="flex flex-col items-center gap-4">
              <div className="w-8 h-8 border-2 border-blue-500/30 border-t-blue-500 rounded-full animate-spin"></div>
              <p className="text-gray-500 text-sm">Loading...</p>
            </div>
          </div>
        );
      }
      
      if (!user) {
        return <LoginScreen onLogin={handleLogin} />;
      }
      
      return <Dashboard user={user} onLogout={handleLogout} />;
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
