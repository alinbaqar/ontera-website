    * { font-family: 'Inter', system-ui, sans-serif; }
    body { background: #0a0a0a; }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    
    /* Toggle switch */
    .toggle-switch { position: relative; width: 44px; height: 24px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; cursor: pointer; inset: 0;
      background-color: #3f3f46; border-radius: 24px;
      transition: 0.3s;
    }
    .toggle-slider:before {
      position: absolute; content: ""; height: 18px; width: 18px;
      left: 3px; bottom: 3px; background-color: white;
      border-radius: 50%; transition: 0.3s;
    }
    input:checked + .toggle-slider { background-color: #10b981; }
    input:checked + .toggle-slider:before { transform: translateX(20px); }
    
    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.2s ease-out; }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .animate-spin { animation: spin 1s linear infinite; }
    
    /* Hide scrollbar for message list on mobile */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    // Time formatter
    const formatTime = (timestamp) => {
      const date = new Date(timestamp);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);
      
      if (diffMins < 60) return `${diffMins}m ago`;
      if (diffHours < 24) return `${diffHours}h ago`;
      if (diffDays < 7) return `${diffDays}d ago`;
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    };

      const [password, setPassword] = useState('');

      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [message, setMessage] = useState('');
      
      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        setMessage('');
        
        try {
          if (isSignup) {
            // Sign up
            const { data, error } = await supabase.auth.signUp({
              email,
              password,
            });
            
            if (error) throw error;
            
            if (data.user && !data.session) {
              // Email confirmation required
              setMessage('Check your email for a confirmation link!');
              setLoading(false);
              return;
            }
            
            if (data.session) {
              onLogin(data.user);
            }
          } else {
            // Sign in
            const { data, error } = await supabase.auth.signInWithPassword({
              email,
              password,
            });
            
            if (error) throw error;
            onLogin(data.user);
          }
        } catch (err) {
          setError(err.message || 'An error occurred');
        }

    // Message Thread Component
    const MessageThread = ({ message, onSendReply, onClose }) => {

                  <div className={`max-w-[85%] ${msg.from === 'seller' 
                    ? 'bg-emerald-600/20 border border-emerald-500/30 text-emerald-100' 
                    : 'bg-zinc-800 border border-zinc-700 text-zinc-200'
                  } rounded-2xl px-4 py-2.5`}>
                    <p className="text-sm whitespace-pre-wrap">{msg.text}</p>
                    <p className={`text-xs mt-1 ${msg.from === 'seller' ? 'text-emerald-400/60' : 'text-zinc-500'}`}>
                      {formatTime(msg.time)}
                    </p>
                  </div>
                </div>
              ))
            ) : (
              <div className="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-zinc-300">
                <p className="text-sm">Message from {message.sender}</p>
                <p className="text-xs text-zinc-500 mt-2">{formatTime(message.timestamp)}</p>
                <p className="text-xs text-zinc-600 mt-2 italic">Click "View listing" to see full context on eBay</p>
              </div>
            )}
            <div ref={messagesEndRef} />
          </div>

            <div className="bg-zinc-800/50 rounded-xl p-4 mb-6">

    // API Base URL
    const API_URL = 'https://ontera-api.onteraai.workers.dev';

    // Main Dashboard
    const Dashboard = ({ user, onLogout }) => {
      const [activeTab, setActiveTab] = useState('inbox');
      const [messages, setMessages] = useState([]);
      const [loadingMessages, setLoadingMessages] = useState(false);
      const [stores, setStores] = useState([]);
      const [loadingStores, setLoadingStores] = useState(true);
      const [selectedMessage, setSelectedMessage] = useState(null);
      const [showConnectModal, setShowConnectModal] = useState(false);
      const [filter, setFilter] = useState('all');
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [accessToken, setAccessToken] = useState(null);
      
      // Load stores from Supabase on mount
      useEffect(() => {
        loadStores();
      }, []);
      
      // Load messages when stores are loaded (only once)
      const [messagesLoaded, setMessagesLoaded] = useState(false);
      useEffect(() => {
        if (messagesLoaded) return;
        const connectedStore = stores.find(s => s.connected && s.refreshToken);
        if (connectedStore) {
          setMessagesLoaded(true);
          loadMessages(connectedStore.refreshToken);
        }
      }, [stores, messagesLoaded]);
      
      const loadStores = async () => {
        setLoadingStores(true);
        const { data, error } = await supabase
          .from('stores')
          .select('*')
          .order('created_at', { ascending: true });
        
        if (error) {
          console.error('Error loading stores:', error);
        } else {
          // Transform to UI format
          const storeList = [
            { 
              id: 'ccwraps', 
              name: 'CCWraps', 
              platform: 'ebay',
              connected: false, 
              messages: 0, 
              orders: 0,
              dbId: null
            },
            { 
              id: 'americanstickerdepot', 
              name: 'AmericanStickerDepot', 
              platform: 'ebay',
              connected: false, 
              messages: 0, 
              orders: 0,
              dbId: null
            },
            { 
              id: 'drippedoutcart', 
              name: 'DrippedOutCart', 
              platform: 'ebay',
              connected: false, 
              messages: 0, 
              orders: 0,
              dbId: null
            },
          ];
          
          // Match with database records
          data.forEach(dbStore => {
            const match = storeList.find(s => 
              s.name.toLowerCase() === dbStore.store_name.toLowerCase()
            );
            if (match) {
              match.connected = dbStore.is_active;
              match.dbId = dbStore.id;
              match.accessToken = dbStore.access_token;
              match.refreshToken = dbStore.refresh_token;
            } else {
              // Add store from DB that's not in our default list
              storeList.push({
                id: dbStore.id,
                name: dbStore.store_name,
                platform: dbStore.platform,
                connected: dbStore.is_active,
                messages: 0,
                orders: 0,
                dbId: dbStore.id,
                accessToken: dbStore.access_token,
                refreshToken: dbStore.refresh_token,
              });
            }
          });
          
          setStores(storeList);
        }
        setLoadingStores(false);
      };
      
      const loadMessages = async (refreshToken) => {
        setLoadingMessages(true);
        try {
          // Step 1: Get fresh access token
          const tokenRes = await fetch(`${API_URL}/api/ebay/refresh-token`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ refresh_token: refreshToken }),
          });
          const tokenData = await tokenRes.json();
          
          if (tokenData.error) {
            console.error('Token error:', tokenData);
            setLoadingMessages(false);
            return;
          }
          
          setAccessToken(tokenData.access_token);
          
          // Step 2: Fetch messages
          const messagesRes = await fetch(`${API_URL}/api/ebay/messages`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ access_token: tokenData.access_token }),
          });
          const messagesData = await messagesRes.json();
          
          if (messagesData.messages) {
            // Transform to UI format
            const formattedMessages = messagesData.messages.map(m => ({
              id: m.id,
              sender: m.sender,
              subject: m.subject || 'No subject',
              itemId: m.itemId,
              itemTitle: m.itemTitle || 'eBay Item',
              timestamp: m.receiveDate,
              read: m.read,
              replied: m.replied,
              needsResponse: m.responseEnabled && !m.replied,
              conversation: [],
              messageType: m.messageType,
            }));
            
            setMessages(formattedMessages);
            
            // Update store message count
            setStores(prev => prev.map(s => 
              s.connected ? { ...s, messages: formattedMessages.length } : s
            ));
          }
        } catch (err) {
          console.error('Error loading messages:', err);
        }
        setLoadingMessages(false);
      };
      
      const loadMessageDetail = async (messageId) => {
        if (!accessToken) return null;
        
        try {
          const res = await fetch(`${API_URL}/api/ebay/message`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ access_token: accessToken, message_id: messageId }),
          });
          const detail = await res.json();
          return detail;
        } catch (err) {
          console.error('Error loading message detail:', err);
          return null;
        }
      };
      
      const handleSelectMessage = async (message) => {
        setSelectedMessage({ ...message, loadingDetail: true });
        
        const detail = await loadMessageDetail(message.id);
        if (detail && detail.conversation) {
          // Transform conversation - API now returns 'seller' or 'buyer' directly
          const conversation = detail.conversation.map((msg) => ({
            from: msg.from, // Already 'seller' or 'buyer'
            text: msg.text,
            senderName: msg.senderName,
            time: message.timestamp,
          }));
          
          setSelectedMessage({
            ...message,
            itemTitle: detail.itemTitle || message.itemTitle,
            conversation: conversation,
            loadingDetail: false,
          });
        } else {
          setSelectedMessage({ ...message, loadingDetail: false, conversation: [] });
        }
      };
      
      const needsResponseCount = messages.filter(m => m.needsResponse).length;
      
      const filteredMessages = messages.filter(m => {
        if (filter === 'needsResponse') return m.needsResponse;
        if (filter === 'replied') return m.replied;
        return true;
      });
      
      const handleSendReply = (messageId, replyText) => {
        setMessages(prev => prev.map(m => {
          if (m.id === messageId) {
            return {
              ...m,
              needsResponse: false,
              replied: true,
              conversation: [...m.conversation, {
                from: 'seller',
                text: replyText,
                time: new Date().toISOString(),
              }],
            };
          }
          return m;
        }));
        setSelectedMessage(null);
      };

        // For now, we'll add CCWraps with your existing tokens
        // In production, this would redirect to eBay OAuth

            user_id: user.id,
            platform: 'ebay',
            store_name: storeName || 'CCWraps',
            refresh_token: 'v^1.1#i^1#r^1#p^3#f^0#I^3#t^Ul4xMF8xOkExMzcyOEU1M0JEMEQyNjExQkY4MEY0MzA3ODZGNTU0XzJfMSNFXjI2MA==',
            is_active: true,
          })
          .select()
          .single();
        
        if (error) {
          console.error('Error connecting store:', error);
          alert('Error connecting store: ' + error.message);
        } else {
          console.log('Store connected:', data);
          loadStores(); // Reload stores
        }
      };
      
      return (
        <div className="min-h-screen flex">
          {/* Sidebar - Desktop */}

                </div>
                <span className="text-lg font-semibold text-white tracking-tight">OnteraAI</span>
              </a>
            </div>

                  activeTab === 'inbox' 
                    ? 'bg-emerald-500/10 text-emerald-400' 
                    : 'text-zinc-400 hover:text-white hover:bg-zinc-800/50'
                }`}
              >
                <Icon name="inbox" />
                <span>Inbox</span>
                {needsResponseCount > 0 && (
                  <span className="ml-auto bg-emerald-500 text-white text-xs font-medium px-2 py-0.5 rounded-full">
                    {needsResponseCount}
                  </span>
                )}
              </button>
              
              <button
                onClick={() => setActiveTab('stores')}
                className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors ${
                  activeTab === 'stores' 
                    ? 'bg-emerald-500/10 text-emerald-400' 
                    : 'text-zinc-400 hover:text-white hover:bg-zinc-800/50'
                }`}
              >
                <Icon name="store" />
                <span>Stores</span>
              </button>
              
              <button
                onClick={() => setActiveTab('settings')}
                className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors ${
                  activeTab === 'settings' 
                    ? 'bg-emerald-500/10 text-emerald-400'

                }`}
              >
                <Icon name="settings" />
                <span>Settings</span>
              </button>

                    <div>
                      <h1 className="text-xl font-semibold text-white">Connected Stores</h1>
                      <p className="text-sm text-zinc-500 mt-0.5">Manage your e-commerce platforms</p>
                    </div>
                    <button
                      onClick={() => setShowConnectModal(true)}
                      className="flex items-center gap-2 bg-gradient-to-r from-emerald-500 to-emerald-600 text-white font-medium px-4 py-2 rounded-lg hover:from-emerald-400 hover:to-emerald-500 transition-all text-sm"
                    >
                      <span>+</span>
                      <span className="hidden sm:inline">Connect Store</span>
                    </button>
                  </div>
                  
                  <div className="grid gap-4">
                    {stores.map((store) => (
                      <div
                        key={store.id}
                        className={`bg-zinc-900/50 border rounded-xl p-4 md:p-5 ${
                          store.connected ? 'border-emerald-500/30' : 'border-zinc-800'
                        }`}
                      >
                        <div className="flex items-center justify-between gap-4">
                          <div className="flex items-center gap-3 md:gap-4">
                            <div className={`w-10 h-10 md:w-12 md:h-12 rounded-xl flex items-center justify-center flex-shrink-0 ${
                              store.connected 
                                ? 'bg-gradient-to-br from-emerald-500/20 to-emerald-600/20 text-emerald-400' 
                                : 'bg-zinc-800 text-zinc-500'
                            }`}>
                              <EbayLogo />
                            </div>
                            <div>
                              <h3 className="text-white font-medium">{store.name}</h3>
                              <p className={`text-sm ${store.connected ? 'text-emerald-400' : 'text-zinc-500'}`}>
                                {store.connected ? 'Connected' : 'Not connected'}
                              </p>
                            </div>
                          </div>
                          
                          {store.connected ? (
                            <div className="flex items-center gap-4 md:gap-6 text-sm">
                              <div className="text-center hidden sm:block">
                                <p className="text-white font-medium">{store.messages}</p>
                                <p className="text-zinc-500 text-xs">Messages</p>
                              </div>
                              <div className="text-center hidden sm:block">
                                <p className="text-white font-medium">{store.orders}</p>
                                <p className="text-zinc-500 text-xs">Orders</p>
                              </div>
                              <button className="text-zinc-400 hover:text-white transition-colors">
                                <Icon name="settings" size={18} />
                              </button>
                            </div>
                          ) : (
                            <button
                              onClick={() => setShowConnectModal(true)}
                              className="text-emerald-400 hover:text-emerald-300 text-sm font-medium transition-colors"
                            >
                              Connect →
                            </button>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                  
                  {/* Coming Soon */}
                  <div className="mt-8">
                    <h2 className="text-sm font-medium text-zinc-500 uppercase tracking-wider mb-4">Coming Soon</h2>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                      {['Amazon', 'Shopify', 'TikTok Shop', 'Etsy'].map((platform) => (
                        <div key={platform} className="bg-zinc-900/30 border border-zinc-800/50 rounded-xl p-4 text-center opacity-60">
                          <p className="text-zinc-400 text-sm">{platform}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}
              
              {activeTab === 'settings' && (
                <div className="p-4 md:p-6">
                  <h1 className="text-xl font-semibold text-white mb-6">Settings</h1>
                  
                  <div className="space-y-6 max-w-2xl">
                    <div className="bg-zinc-900/50 border border-zinc-800 rounded-xl p-4 md:p-5">
                      <h3 className="text-white font-medium mb-4">AI Response Settings</h3>
                      <div className="space-y-4">
                        <label className="flex items-center justify-between gap-4">
                          <div>
                            <p className="text-zinc-300">Auto-respond to messages</p>
                            <p className="text-sm text-zinc-500">AI will automatically reply to customer messages</p>
                          </div>
                          <label className="toggle-switch flex-shrink-0">
                            <input type="checkbox" />
                            <span className="toggle-slider"></span>
                          </label>
                        </label>
                        
                        <label className="flex items-center justify-between gap-4">
                          <div>
                            <p className="text-zinc-300">Require approval</p>
                            <p className="text-sm text-zinc-500">Review AI responses before sending</p>
                          </div>
                          <label className="toggle-switch flex-shrink-0">
                            <input type="checkbox" defaultChecked />
                            <span className="toggle-slider"></span>
                          </label>
                        </label>
                      </div>
                    </div>
                    
                    <div className="bg-zinc-900/50 border border-zinc-800 rounded-xl p-4 md:p-5">
                      <h3 className="text-white font-medium mb-4">Notifications</h3>
                      <div className="space-y-4">
                        <label className="flex items-center justify-between gap-4">
                          <div>
                            <p className="text-zinc-300">Email notifications</p>
                            <p className="text-sm text-zinc-500">Get notified of new messages</p>
                          </div>
                          <label className="toggle-switch flex-shrink-0">
                            <input type="checkbox" defaultChecked />
                            <span className="toggle-slider"></span>
                          </label>
                        </label>
                        
                        <label className="flex items-center justify-between gap-4">
                          <div>
                            <p className="text-zinc-300">Daily digest</p>
                            <p className="text-sm text-zinc-500">Summary of store activity</p>
                          </div>
                          <label className="toggle-switch flex-shrink-0">
                            <input type="checkbox" defaultChecked />
                            <span className="toggle-slider"></span>
                          </label>
                        </label>
                      </div>
                    </div>
                    
                    <div className="bg-zinc-900/50 border border-zinc-800 rounded-xl p-4 md:p-5">
                      <h3 className="text-white font-medium mb-4">Account</h3>
                      <div className="space-y-3">
                        <div className="flex items-center justify-between">
                          <span className="text-zinc-400">Email</span>
                          <span className="text-white">{user.email}</span>
                        </div>
                        <div className="flex items-center justify-between">
                          <span className="text-zinc-400">Plan</span>
                          <span className="text-emerald-400">Pro - $149/mo</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
            
            {/* Message Detail Panel */}
            {selectedMessage && (
              <div className="fixed inset-0 md:relative md:inset-auto w-full lg:w-[480px] md:border-l border-zinc-800 bg-[#0a0a0a] md:bg-zinc-900/30 flex flex-col z-50 md:z-auto pt-[105px] md:pt-0">
                <MessageThread
                  message={selectedMessage}
                  onSendReply={handleSendReply}
                  onClose={() => setSelectedMessage(null)}
                />
              </div>
            )}
          </div>
          
          {/* Connect Store Modal */}
          {showConnectModal && (
            <ConnectStoreModal
              onClose={() => setShowConnectModal(false)}
              onConnect={() => loadStores()}
              user={user}
            />
          )}
        </div>
      );
    };

    // Main App
    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      
      // Check for existing Supabase session
      useEffect(() => {
        // Get initial session
        supabase.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user ?? null);
          setLoading(false);
        });

        // Listen for auth changes
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user ?? null);
        });

        return () => subscription.unsubscribe();
      }, []);
      
      const handleLogin = (userData) => {
        setUser(userData);
      };
      
      const handleLogout = async () => {
        await supabase.auth.signOut();
        setUser(null);
      };
      
      // Show loading state while checking session
      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="flex flex-col items-center gap-4">
              <div className="w-8 h-8 border-2 border-emerald-500/30 border-t-emerald-500 rounded-full animate-spin"></div>
              <p className="text-zinc-500 text-sm">Loading...</p>
            </div>
          </div>
        );
      }
      
      if (!user) {
        return <LoginScreen onLogin={handleLogin} />;
      }
      
      return <Dashboard user={user} onLogout={handleLogout} />;
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
